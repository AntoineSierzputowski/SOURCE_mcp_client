# source.yaml
source_cloud:
  username: pharmacorp
  key: azerty
database:
  type: mysql
  host: 127.0.0.1
  port: 3306
  name: pharma_lab_db
  user: source_reader
  password: "S0urc3_R3ad_2026!"

server:
  name: "PharmaCorp Laboratory"
  description: "Database of 12,000 characterized molecules including chemical properties, toxicity profiles, and clinical trial results from phases 1 to 3."

tables:
  molecules:
    expose: true
    description: "Molecules characterized by the laboratory with their biological properties and clinical advancement."
    columns:
      molecule_id:
        expose: true
        description: "Unique identifier of the molecule"
      name:
        expose: true
        description: "Name of the molecule"
      type:
        expose: true
        description: "Therapeutic family (kinase_inhibitor, GPCR_agonist, protease_inhibitor)"
      ic50_nm:
        expose: true
        description: "Half-maximal inhibitory concentration in nanomolars. Lower means more potent."
      hepatotoxicity:
        expose: true
        description: "Liver toxicity observed in preclinical trials"
      max_clinical_phase:
        expose: true
        description: "Highest clinical phase reached (0=preclinical, 1-3=clinical phases, 4=approved)"
      structure_smiles:
        expose: false
      created_at:
        expose: false