database:
  type: postgresql
  host: 127.0.0.1
  port: 5432
  name: greenhouse
  user: reader
  password: "reader_greenhouse"

server:
  name: "Greenhouse Monitoring"
  description: >
    Environmental sensor data from the greenhouse monitoring system.
    Tracks temperature, humidity, CO2, light, and other climate measurements
    collected by sensors distributed across greenhouse zones.

tables:
  sensor_data:
    expose: true
    description: "Time-series measurements recorded by greenhouse sensors across all zones."
    columns:
      id:
        expose: true
        description: "Unique identifier of the sensor reading"
      sensor_id:
        expose: true
        description: "Identifier of the sensor that produced the measurement"
      recorded_at:
        expose: true
        description: "Timestamp when the measurement was recorded"
      zone:
        expose: true
        description: "Greenhouse zone where the sensor is located"
      temperature:
        expose: true
        description: "Air temperature in degrees Celsius"
      humidity:
        expose: true
        description: "Relative air humidity in percentage"
      co2:
        expose: true
        description: "CO2 concentration in ppm"
      light:
        expose: true
        description: "Light intensity in lux"
      soil_moisture:
        expose: true
        description: "Soil moisture level in percentage"
